<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OutfitPicker</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#fdf4ff', 100:'#fae8ff', 300:'#d8b4fe', 400:'#c084fc', 500:'#a855f7', 600:'#9333ea', 700:'#7e22ce' },
            ink:   { 900:'#0f0f11', 800:'#1a1a1f', 700:'#25252d', 600:'#3a3a45' }
          },
          fontFamily: { sans: ['Inter','sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #f8f7f5; }

    .fade-in  { animation: fadeIn  0.28s ease both; }
    .slide-up { animation: slideUp 0.32s cubic-bezier(0.22,1,0.36,1) both; }
    @keyframes fadeIn  { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

    .shimmer { background:linear-gradient(90deg,#ececec 25%,#ddd 50%,#ececec 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    .card-pop { animation: cardPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }
    @keyframes cardPop { from{opacity:0;transform:scale(0.92)} to{opacity:1;transform:scale(1)} }

    .spin-icon { animation: spinIcon 0.5s ease; }
    @keyframes spinIcon { from{transform:rotate(0deg) scale(0.8)} to{transform:rotate(360deg) scale(1)} }

    .pulse-ring { animation: pulseRing 1.6s ease infinite; }
    @keyframes pulseRing { 0%,100%{transform:scale(1);opacity:.6} 50%{transform:scale(1.5);opacity:0} }

    /* Scrollbar */
    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-thumb { background:#d1d5db; border-radius:3px; }

    /* Slider */
    .before-after-range { position:absolute; inset:0; width:100%; height:100%; opacity:0; cursor:ew-resize; }
    .before-after-range::-webkit-slider-thumb { -webkit-appearance:none; width:32px; height:32px; }

    /* Wardrobe card hover */
    .wardrobe-card:hover .card-img { transform:scale(1.06); }
    .card-img { transition: transform 0.4s ease; }

    .display { font-family: 'Playfair Display', serif; }

    /* Nav active bar */
    .nav-active::before { content:''; position:absolute; left:0; top:50%; transform:translateY(-50%); width:3px; height:60%; background:#a855f7; border-radius:0 2px 2px 0; }

    /* Onboarding */
    .ob-enter { animation: obEnter 0.35s cubic-bezier(0.22,1,0.36,1) both; }
    @keyframes obEnter { from{opacity:0;transform:translateY(24px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
    .ob-slide { animation: obSlide 0.3s cubic-bezier(0.22,1,0.36,1) both; }
    @keyframes obSlide { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;

/* ── Data ──────────────────────────────────────────────────────────────── */
const WARDROBE = [
  { id:1, name:'White Oxford Shirt',   category:'Tops',     color:'White', img:'https://images.unsplash.com/photo-1596755094514-f87e34085b2c?w=400&q=80', confidence:97 },
  { id:2, name:'Navy Slim Chinos',     category:'Bottoms',  color:'Navy',  img:'https://images.unsplash.com/photo-1542272604-787c3835535d?w=400&q=80', confidence:94 },
  { id:3, name:'Black Blazer',         category:'Tops',     color:'Black', img:'https://images.unsplash.com/photo-1507679799987-c73779587ccf?w=400&q=80', confidence:91 },
  { id:4, name:'Grey Crew Sweatshirt', category:'Tops',     color:'Grey',  img:'https://images.unsplash.com/photo-1556821840-3a63f15732ce?w=400&q=80', confidence:88 },
  { id:5, name:'White Sneakers',       category:'Shoes',    color:'White', img:'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&q=80', confidence:99 },
  { id:6, name:'Chelsea Boots',        category:'Shoes',    color:'Brown', img:'https://images.unsplash.com/photo-1608256246200-53e635b5b65f?w=400&q=80', confidence:95 },
  { id:7, name:'Light Wash Jeans',     category:'Bottoms',  color:'Blue',  img:'https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=400&q=80', confidence:96 },
  { id:8, name:'Camel Overcoat',       category:'Outerwear',color:'Camel', img:'https://images.unsplash.com/photo-1544022613-e87ca75a784a?w=400&q=80', confidence:89 },
];

const OUTFITS = [
  { id:1, name:'Smart Casual Friday', occasion:'Work',    items:[1,2,6], score:94, hero:'https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=600&q=80',
    reason:'White Oxford + Navy Chinos create a clean contrast. Chelsea Boots elevate the look without trying.' },
  { id:2, name:'Weekend Errands',     occasion:'Casual',  items:[4,7,5], score:88, hero:'https://images.unsplash.com/photo-1539109136881-3be0616acf4b?w=600&q=80',
    reason:'Grey sweatshirt over light jeans is effortlessly relaxed. White sneakers keep it fresh.' },
  { id:3, name:'Business Formal',     occasion:'Formal',  items:[3,1,2,6], score:97, hero:'https://images.unsplash.com/photo-1496747611176-843222e1e57c?w=600&q=80',
    reason:'Black blazer over white shirt is a power combo. Navy chinos + chelsea boots complete it.' },
  { id:4, name:'Winter Ready',        occasion:'Outdoor', items:[8,1,2,6], score:91, hero:'https://images.unsplash.com/photo-1485968579580-b6d095142e6e?w=600&q=80',
    reason:'Camel overcoat is the statement piece. The outfit underneath stays clean and structured.' },
];

const occasionColors = {
  Work:'bg-blue-100 text-blue-700', Casual:'bg-emerald-100 text-emerald-700',
  Formal:'bg-violet-100 text-violet-700', Outdoor:'bg-amber-100 text-amber-700', Surprise:'bg-pink-100 text-pink-700',
};

/* ── Helpers ───────────────────────────────────────────────────────────── */
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function ScoreRing({ score, size = 52 }) {
  const r = 18, c = 2 * Math.PI * r;
  const fill = (score / 100) * c;
  return (
    <svg width={size} height={size} viewBox="0 0 44 44">
      <circle cx="22" cy="22" r={r} fill="none" stroke="#f3e8ff" strokeWidth="4" />
      <circle cx="22" cy="22" r={r} fill="none" stroke="#a855f7" strokeWidth="4"
        strokeDasharray={`${fill} ${c}`} strokeLinecap="round"
        transform="rotate(-90 22 22)" />
      <text x="22" y="22" textAnchor="middle" dominantBaseline="central"
        fontSize="9" fontWeight="700" fill="#7e22ce">{score}</text>
    </svg>
  );
}

function Badge({ label, colorClass }) {
  return <span className={`text-xs font-semibold px-2.5 py-1 rounded-full ${colorClass}`}>{label}</span>;
}

/* ── Sidebar ───────────────────────────────────────────────────────────── */
function Sidebar({ view, setView, primaryNav, secondaryNav, onHelp }) {
  const NavBtn = ({ n, big }) => (
    <button onClick={() => setView(n.id)}
      className={`relative w-full flex items-center gap-3 rounded-xl font-medium transition-all
        ${big ? 'px-3 py-2.5 text-sm' : 'px-3 py-2 text-xs'}
        ${view===n.id ? 'nav-active bg-ink-700 text-white' : 'text-gray-400 hover:bg-ink-800 hover:text-white'}`}>
      <span className={big ? 'text-base' : 'text-sm'}>{n.icon}</span>{n.label}
    </button>
  );

  return (
    <aside className="hidden sm:flex flex-col w-64 bg-ink-900 text-white p-5 gap-0.5 sticky top-0 h-screen shrink-0">
      {/* Logo */}
      <div className="flex items-center gap-3 px-3 py-4 mb-4">
        <div className="w-9 h-9 bg-brand-500 rounded-xl flex items-center justify-center font-black text-sm tracking-tight">OP</div>
        <span className="font-bold text-lg tracking-tight">OutfitPicker</span>
      </div>

      {/* Primary nav */}
      <div className="space-y-0.5 mb-4">
        {primaryNav.map(n => <NavBtn key={n.id} n={n} big />)}
      </div>

      {/* Secondary nav */}
      <div className="border-t border-ink-700 pt-3 space-y-0.5">
        <p className="text-xs text-gray-600 font-semibold px-3 mb-1.5 uppercase tracking-wider">Library</p>
        {secondaryNav.map(n => <NavBtn key={n.id} n={n} big={false} />)}
      </div>

      {/* Bottom */}
      <div className="mt-auto space-y-3">
        <div className="bg-ink-800 rounded-xl p-3">
          <div className="flex items-center justify-between mb-2">
            <span className="text-xs font-semibold text-gray-300">AI Credits</span>
            <span className="text-xs text-brand-400 font-semibold">20 / 50</span>
          </div>
          <div className="w-full bg-ink-700 rounded-full h-1.5">
            <div className="bg-brand-500 h-1.5 rounded-full" style={{width:'40%'}} />
          </div>
        </div>
        <button onClick={onHelp}
          className="w-full flex items-center gap-3 px-3 py-2 rounded-xl text-xs font-medium text-gray-400 hover:bg-ink-800 hover:text-white transition-all">
          <span className="w-4 h-4 rounded-full border border-gray-600 flex items-center justify-center text-xs font-bold">?</span>
          How it works
        </button>
        <div className="flex items-center gap-3 px-1 pt-1">
          <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=80&q=80"
            className="w-8 h-8 rounded-full object-cover border-2 border-ink-700" />
          <div>
            <p className="text-sm font-semibold text-white leading-none">Jesse</p>
            <p className="text-xs text-gray-500 mt-0.5">jesscoshirts@gmail.com</p>
          </div>
        </div>
      </div>
    </aside>
  );
}

/* ── Upload View ───────────────────────────────────────────────────────── */
function UploadView({ onUploaded }) {
  const [stage, setStage] = useState('idle');
  const [progress, setProgress] = useState(0);
  const [dragOver, setDragOver] = useState(false);
  const [detected, setDetected] = useState([]);
  const fileRef = useRef();

  const simulateUpload = useCallback(() => {
    setStage('uploading'); setProgress(0);
    const iv = setInterval(() => setProgress(p => {
      if (p >= 100) { clearInterval(iv); startScan(); return 100; }
      return Math.min(p + 7 + Math.random() * 5, 100);
    }), 90);
  }, []);

  const startScan = () => {
    setStage('scanning');
    setTimeout(() => {
      setDetected([
        { id:1, label:'Shirt',    sublabel:'Long sleeve, light',  confidence:97, color:'#e2e8f0' },
        { id:2, label:'Jeans',    sublabel:'Straight cut, medium wash', confidence:94, color:'#bfdbfe' },
        { id:3, label:'Sneakers', sublabel:'Low top, casual',     confidence:99, color:'#f1f5f9' },
      ]);
      setStage('done');
    }, 2400);
  };

  if (stage === 'done') return (
    <div className="fade-in max-w-xl mx-auto">
      <div className="mb-8">
        <div className="inline-flex items-center gap-2 bg-emerald-50 text-emerald-700 px-3 py-1.5 rounded-full text-xs font-semibold mb-4">
          ✓ Detection complete
        </div>
        <h2 className="text-2xl font-bold text-gray-900">3 items found</h2>
        <p className="text-gray-500 mt-1">Review each item before adding to your wardrobe.</p>
      </div>

      <div className="relative bg-gray-100 rounded-2xl overflow-hidden mb-6 h-60">
        <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=600&q=80"
          alt="Closet" className="w-full h-full object-cover" />
        <div className="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent" />
        {/* Detection boxes */}
        <div className="absolute top-4 left-6 border-2 border-brand-400 rounded-lg w-28 h-16 bg-brand-400/10">
          <span className="absolute -top-6 left-0 text-xs bg-brand-500 text-white px-2 py-0.5 rounded font-semibold">Shirt 97%</span>
        </div>
        <div className="absolute top-24 left-6 border-2 border-brand-400 rounded-lg w-28 h-20 bg-brand-400/10">
          <span className="absolute -top-6 left-0 text-xs bg-brand-500 text-white px-2 py-0.5 rounded font-semibold">Jeans 94%</span>
        </div>
        <div className="absolute bottom-6 left-8 border-2 border-brand-400 rounded-lg w-20 h-10 bg-brand-400/10">
          <span className="absolute -top-6 left-0 text-xs bg-brand-500 text-white px-2 py-0.5 rounded font-semibold">Shoes 99%</span>
        </div>
      </div>

      <div className="space-y-2 mb-6">
        {detected.map((d, i) => (
          <div key={d.id} className="slide-up bg-white rounded-2xl p-4 flex items-center gap-4 border border-gray-100"
            style={{animationDelay:`${i*60}ms`}}>
            <div className="w-12 h-12 rounded-xl flex items-center justify-center text-lg font-bold"
              style={{background: d.color}}>{d.label[0]}</div>
            <div className="flex-1">
              <p className="font-semibold text-gray-900">{d.label}</p>
              <p className="text-xs text-gray-400">{d.sublabel}</p>
            </div>
            <div className="flex items-center gap-1.5">
              <div className="text-xs font-bold text-brand-600 bg-brand-50 px-2 py-1 rounded-lg">{d.confidence}%</div>
              <button className="text-xs text-gray-400 border border-gray-200 px-2.5 py-1 rounded-lg hover:bg-gray-50 transition-colors">Edit</button>
              <button className="text-xs text-white bg-brand-500 px-2.5 py-1 rounded-lg hover:bg-brand-600 transition-colors">Keep</button>
            </div>
          </div>
        ))}
      </div>

      <button onClick={onUploaded}
        className="w-full py-3.5 bg-brand-500 hover:bg-brand-600 text-white font-bold rounded-2xl transition-colors text-sm">
        Add 3 items to Wardrobe →
      </button>
    </div>
  );

  return (
    <div className="max-w-xl mx-auto">
      <div className="mb-8">
        <h2 className="text-2xl font-bold text-gray-900">Upload Closet Photo</h2>
        <p className="text-gray-500 mt-1">AI detects and catalogs every clothing item automatically.</p>
      </div>

      <div
        onDragOver={e => { e.preventDefault(); setDragOver(true); }}
        onDragLeave={() => setDragOver(false)}
        onDrop={e => { e.preventDefault(); setDragOver(false); if(e.dataTransfer.files.length) simulateUpload(); }}
        onClick={() => stage === 'idle' && fileRef.current.click()}
        className={`rounded-3xl border-2 border-dashed transition-all cursor-pointer overflow-hidden
          ${dragOver ? 'border-brand-500 bg-brand-50' : 'border-gray-200 bg-white hover:border-brand-300 hover:bg-brand-50/30'}
          ${stage !== 'idle' ? 'cursor-default' : ''}`}>
        <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={() => simulateUpload()} />

        {stage === 'idle' && (
          <div className="py-16 px-8 text-center">
            <div className="w-16 h-16 bg-brand-100 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-5">📸</div>
            <p className="font-bold text-gray-800 text-lg">Drop your photo here</p>
            <p className="text-gray-400 text-sm mt-1 mb-6">or click to browse · JPEG, PNG up to 20MB</p>
            <button onClick={e => { e.stopPropagation(); simulateUpload(); }}
              className="px-6 py-2.5 bg-brand-500 text-white rounded-xl text-sm font-semibold hover:bg-brand-600 transition-colors">
              Try Demo Upload
            </button>
          </div>
        )}

        {stage === 'uploading' && (
          <div className="py-14 px-8 text-center">
            <p className="text-gray-700 font-semibold mb-5">Uploading to S3…</p>
            <div className="max-w-xs mx-auto bg-gray-100 rounded-full h-2 mb-3">
              <div className="bg-brand-500 h-2 rounded-full transition-all duration-100" style={{width:`${progress}%`}} />
            </div>
            <p className="text-sm text-gray-400 font-medium">{Math.round(progress)}%</p>
          </div>
        )}

        {stage === 'scanning' && (
          <div className="py-14 px-8 text-center">
            <div className="relative w-16 h-16 mx-auto mb-5">
              <div className="pulse-ring absolute inset-0 rounded-full bg-brand-300" />
              <div className="w-16 h-16 bg-brand-100 rounded-full flex items-center justify-center text-3xl">🤖</div>
            </div>
            <p className="text-gray-700 font-semibold">AI scanning for clothing…</p>
            <p className="text-xs text-gray-400 mt-1">AWS Rekognition at work</p>
          </div>
        )}
      </div>

      <div className="mt-6 grid grid-cols-3 gap-3">
        {[['📷','Snap or upload','Any angle works'],['🤖','AI detection','Finds each item'],['✏️','Review & save','Correct anything']].map(([icon,t,s])=>(
          <div key={t} className="bg-white rounded-2xl p-4 text-center border border-gray-100">
            <div className="text-xl mb-2">{icon}</div>
            <p className="text-xs font-bold text-gray-700">{t}</p>
            <p className="text-xs text-gray-400 mt-0.5">{s}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── Wardrobe View ─────────────────────────────────────────────────────── */
const catColors = {
  Tops:'bg-blue-500', Bottoms:'bg-emerald-500', Shoes:'bg-amber-500', Outerwear:'bg-violet-500'
};

function WardrobeView({ items }) {
  const [filter, setFilter] = useState('All');
  const categories = ['All', ...new Set(items.map(i => i.category))];
  const filtered = filter === 'All' ? items : items.filter(i => i.category === filter);

  return (
    <div>
      <div className="flex items-end justify-between mb-6">
        <div>
          <h2 className="text-2xl font-bold text-gray-900">My Wardrobe</h2>
          <p className="text-gray-400 text-sm mt-0.5">{items.length} items</p>
        </div>
        <div className="text-xs text-gray-400 bg-white border border-gray-100 px-3 py-1.5 rounded-xl font-medium">
          Sort: Recent
        </div>
      </div>

      <div className="flex gap-2 mb-6 flex-wrap">
        {categories.map(c => (
          <button key={c} onClick={() => setFilter(c)}
            className={`px-4 py-1.5 rounded-full text-sm font-semibold transition-all border
              ${filter===c ? 'bg-gray-900 text-white border-gray-900' : 'bg-white text-gray-500 border-gray-200 hover:border-gray-400'}`}>
            {c}
          </button>
        ))}
      </div>

      <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
        {filtered.map((item, i) => (
          <div key={item.id} className="wardrobe-card fade-in group cursor-pointer rounded-2xl overflow-hidden bg-white border border-gray-100 hover:shadow-lg transition-shadow"
            style={{animationDelay:`${i*30}ms`}}>
            <div className="relative h-52 overflow-hidden">
              <img src={item.img} alt={item.name} className="card-img w-full h-full object-cover" />
              <div className="absolute inset-0 bg-gradient-to-t from-black/70 via-black/10 to-transparent" />
              <div className="absolute top-2.5 left-2.5">
                <span className={`text-white text-xs font-bold px-2 py-0.5 rounded-full ${catColors[item.category] || 'bg-gray-500'}`}>
                  {item.category}
                </span>
              </div>
              <div className="absolute top-2.5 right-2.5">
                <span className="text-xs bg-black/40 text-white backdrop-blur-sm px-2 py-0.5 rounded-full font-semibold">{item.confidence}%</span>
              </div>
              <div className="absolute bottom-0 left-0 right-0 p-3">
                <p className="text-white font-semibold text-sm leading-tight">{item.name}</p>
                <p className="text-white/60 text-xs mt-0.5">{item.color}</p>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── Surprise Me ───────────────────────────────────────────────────────── */
const SURPRISE_NAMES   = ['Bold Monday','Vibe Check','Chaos Chic','Accidental Genius','Plot Twist','Lucky Combo','Wild Card','The Random'];
const SURPRISE_REASONS = (top, bottom, shoe) => [
  `${top.color} and ${bottom.color} together? Unexpectedly works. ${shoe.name} seals it.`,
  `Nobody saw this pairing coming — but here we are. Somehow it clicks.`,
  `${top.name} over ${bottom.name} breaks the formula. That's exactly why it works.`,
  `The ${shoe.color} shoes pull the whole thing together without trying.`,
  `Sometimes the algorithm surprises itself. This is one of those times.`,
];

function generateSurpriseOutfit(wardrobe) {
  const tops=wardrobe.filter(i=>i.category==='Tops'), bottoms=wardrobe.filter(i=>i.category==='Bottoms'), shoes=wardrobe.filter(i=>i.category==='Shoes');
  if(!tops.length||!bottoms.length||!shoes.length) return null;
  const top=pick(tops), bottom=pick(bottoms), shoe=pick(shoes);
  const items=[top,bottom,shoe];
  const ow=wardrobe.filter(i=>i.category==='Outerwear');
  if(ow.length&&Math.random()>.5) items.push(pick(ow));
  return { id:'surprise', name:pick(SURPRISE_NAMES), occasion:'Surprise', items:items.map(i=>i.id), score:Math.floor(Math.random()*18)+80, reason:pick(SURPRISE_REASONS(top,bottom,shoe)) };
}

/* ── Outfits View ──────────────────────────────────────────────────────── */
function OutfitsView({ outfits, wardrobe, onSurpriseSaved }) {
  const [selected, setSelected]   = useState(null);
  const [surprise, setSurprise]   = useState(() => generateSurpriseOutfit(wardrobe));
  const [shuffleKey, setShuffleKey] = useState(0);
  const getItem = id => wardrobe.find(w => w.id === id);

  const doShuffle = () => { setSurprise(generateSurpriseOutfit(wardrobe)); setShuffleKey(k=>k+1); };

  /* Detail view */
  if (selected) {
    const outfit = outfits.find(o => o.id === selected);
    return (
      <div className="fade-in max-w-2xl">
        <button onClick={() => setSelected(null)} className="flex items-center gap-1.5 text-sm text-gray-400 hover:text-gray-700 mb-6 font-medium transition-colors">
          ← Back
        </button>
        {/* Tall hero */}
        <div className="relative rounded-3xl overflow-hidden h-96 mb-6">
          <img src={outfit.hero} alt={outfit.name} className="w-full h-full object-cover object-top" />
          <div className="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent" />
          <div className="absolute bottom-0 left-0 right-0 p-6">
            <Badge label={outfit.occasion} colorClass={occasionColors[outfit.occasion]} />

        </div>

        <div className="p-5">
          <div className="flex items-start justify-between mb-3">
            <div className="flex items-center gap-2.5">
              <div className={`w-9 h-9 rounded-xl bg-gradient-to-br ${s.accent} flex items-center justify-center text-lg`}>
                {s.emoji}
              </div>
              <div>
                <p className="text-xs text-gray-400 font-semibold uppercase tracking-wide">Step {s.step} of {TOUR_STEPS.length}</p>
                <p className="text-sm font-black text-white leading-tight">{s.heading}</p>
              </div>
            </div>
            <button onClick={onSkip} className="text-gray-500 hover:text-gray-300 transition-colors text-lg leading-none mt-0.5">✕</button>
          </div>

          <p className="text-sm text-gray-300 leading-relaxed mb-3">{s.instruction}</p>

          <div className="flex items-center gap-2 bg-ink-800 rounded-xl px-3 py-2 mb-4">
            <span className="text-yellow-400 text-sm">💡</span>
            <span className="text-xs text-gray-400">{s.hint}</span>
          </div>

          <div className="flex items-center gap-2.5">
            {stepIndex > 0 && (
              <button onClick={() => onNext(stepIndex - 1)}
                className="px-4 py-2.5 rounded-xl border border-ink-600 text-gray-400 hover:text-white hover:border-ink-500 transition-all text-sm font-semibold">
                ←
              </button>
            )}
            <button onClick={() => { setView(s.navigateTo); onNext(stepIndex + 1); }}
              className={`flex-1 py-2.5 rounded-xl font-black text-sm text-white bg-gradient-to-r ${s.accent} hover:opacity-90 transition-opacity`}>
              {s.action}
            </button>
            {!isLast && (
              <button onClick={() => onNext(stepIndex + 1)}
                className="px-4 py-2.5 rounded-xl border border-ink-600 text-gray-400 hover:text-white hover:border-ink-500 transition-all text-sm font-medium whitespace-nowrap">
                Skip step
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── App Shell ─────────────────────────────────────────────────────────── */
function App() {
  const [view, setView]         = useState('outfits');
  const [wardrobe]              = useState(WARDROBE);
  const [toast, setToast]       = useState(null);
  const [tourPhase, setTourPhase] = useState('welcome'); // 'welcome' | 0-3 (step index) | 'done'

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null), 3200); };

  const handleUploaded = () => {
    showToast('3 items added to your wardrobe!');
    setView('wardrobe');
    if (tourPhase === 0) setTourPhase(1);
  };

  const primaryNav   = [
    { id:'tryon',   icon:'🪞', label:'Try On' },
    { id:'outfits', icon:'✨', label:'Outfits' },
  ];
  const secondaryNav = [
    { id:'wardrobe', icon:'👗', label:'Wardrobe' },
    { id:'upload',   icon:'📸', label:'Upload' },
  ];
  const allNav = [...primaryNav, ...secondaryNav];

  return (
    <div className="min-h-screen flex">
      <Sidebar
        view={view} setView={setView}
        primaryNav={primaryNav} secondaryNav={secondaryNav}
        onHelp={() => setTourPhase('welcome')}
      />

      <main className="flex-1 overflow-y-auto">
        <div className="max-w-4xl mx-auto p-6 sm:p-8">
          <div className="fade-in" key={view}>
            {view==='tryon'    && <TryOnView wardrobe={wardrobe} outfits={OUTFITS} />}
            {view==='outfits'  && <OutfitsView outfits={OUTFITS} wardrobe={wardrobe} onSurpriseSaved={name=>showToast(`"${name}" saved!`)} />}
            {view==='wardrobe' && <WardrobeView items={wardrobe} />}
            {view==='upload'   && <UploadView onUploaded={handleUploaded} />}
          </div>
        </div>
      </main>

      {/* Mobile nav — primary items large, secondary smaller */}
      <nav className="sm:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex z-40">
        {primaryNav.map(n => (
          <button key={n.id} onClick={() => setView(n.id)}
            className={`flex-1 flex flex-col items-center py-3 text-xs font-black transition-colors
              ${view===n.id ? 'text-brand-600' : 'text-gray-400'}`}>
            <span className="text-xl leading-none mb-0.5">{n.icon}</span>{n.label}
          </button>
        ))}
        {secondaryNav.map(n => (
          <button key={n.id} onClick={() => setView(n.id)}
            className={`flex-1 flex flex-col items-center py-2.5 text-xs font-medium transition-colors
              ${view===n.id ? 'text-brand-500' : 'text-gray-300'}`}>
            <span className="text-base leading-none mb-0.5">{n.icon}</span>{n.label}
          </button>
        ))}
      </nav>

      {/* Welcome modal */}
      {tourPhase === 'welcome' && (
        <WelcomeModal
          onStart={() => setTourPhase(0)}
          onSkip={() => setTourPhase('done')}
        />
      )}

      {/* Guided tour bar */}
      {typeof tourPhase === 'number' && tourPhase < TOUR_STEPS.length && (
        <GuidedTour
          stepIndex={tourPhase}
          onNext={next => setTourPhase(next >= TOUR_STEPS.length ? 'done' : next)}
          onSkip={() => setTourPhase('done')}
          setView={setView}
        />
      )}

      {/* Tour complete toast */}
      {tourPhase === 'done' && toast === null && (() => { setTimeout(() => showToast('You\'re all set! Enjoy OutfitPicker 🎉'), 100); setTourPhase('finished'); return null; })()}

      {/* Toast */}
      {toast && (
        <div className="fixed bottom-24 sm:bottom-6 right-6 bg-gray-900 text-white text-sm px-4 py-3 rounded-2xl shadow-2xl fade-in font-medium flex items-center gap-2 z-50">
          ✅ {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
